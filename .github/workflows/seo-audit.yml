name: SEO Audit

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target URL to audit'
        required: true
        type: string

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd seo-audit-engine
          pip install -r requirements.txt

      - name: Run SEO audit
        env:
          MODEL_PROVIDER: ${{ secrets.MODEL_PROVIDER }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          cd seo-audit-engine
          python main.py "${{ github.event.inputs.target_url }}"

      - name: Commit and push report
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add reports/
          git commit -m "Add SEO audit report for ${{ github.event.inputs.target_url }}" || echo "No changes to commit"
          git push
